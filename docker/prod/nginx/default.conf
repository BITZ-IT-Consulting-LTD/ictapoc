# Production Proxy Configuration - Docker Nginx (Proxy Only)
# This container contains NO redirect logic. It only routes traffic.

upstream frontend_upstream {
    server frontend:8087;
}

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 100M;
    
    # Standard headers for behind-proxy operation
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # We pass the protocol received from the host. 
    # If host is HTTPS, it sends 'https'.
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

    # A. Frontend
    location / {
        proxy_pass http://frontend_upstream;
    }

    # B. API
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
    }

    # C. Media
    location /media/ {
        proxy_pass http://backend_upstream;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Accept-Ranges bytes;
    }

    # D. Admin
    location /admin/ {
        proxy_pass http://backend_upstream;
    }
}
