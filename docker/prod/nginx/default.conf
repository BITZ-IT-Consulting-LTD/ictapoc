# Production Proxy Configuration - Docker Nginx
# Optimized for Host-SSL and X-Accel-Redirect

upstream frontend_upstream {
    server frontend:8087;
}

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 100M;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

    # A. Frontend
    location / {
        proxy_pass http://frontend_upstream;
    }

    # B. API
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
    }

    # C. Media (Public/Standard)
    location /media/ {
        proxy_pass http://backend_upstream;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # D. Optimized Protected Media (X-Accel-Redirect)
    # This is what renders your real PDFs instead of placeholders
    location /_protected_media/ {
        internal;
        alias /app/media/; # Must match media_volume mount in docker-compose
    }

    # E. Admin
    location /admin/ {
        proxy_pass http://backend_upstream;
    }
}
