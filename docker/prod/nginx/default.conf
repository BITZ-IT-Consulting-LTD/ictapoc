# Production Proxy - Docker Nginx (Strict Routing)

upstream backend_service {
    server backend:8000;
}

upstream frontend_service {
    server frontend:8087;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 100M;
    
    # Global Proxy Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

    # 1. API: Explicitly pass to backend
    location /api/ {
        proxy_pass http://backend_service;
        proxy_buffering off; # Critical for streaming PDFs
        proxy_read_timeout 300s;
        
        # Ensure the response is served as-is
        proxy_hide_header X-Frame-Options; 
    }

    # 2. Django Admin & Static
    location /admin/ {
        proxy_pass http://backend_service;
    }

    # 3. Media: Fallback for standard media
    location /media/ {
        proxy_pass http://backend_service;
        proxy_buffering off;
    }

    # 4. Internal Protected Media (X-Accel-Redirect)
    location /_protected_media/ {
        internal;
        alias /app/media/;
    }

    # 5. Frontend SPA: Everything else
    location / {
        proxy_pass http://frontend_service;
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}
