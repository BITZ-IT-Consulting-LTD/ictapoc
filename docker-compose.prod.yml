version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: ./docker/prod/backend/Dockerfile
    # The entrypoint script handles migrations, static collection, and seeding
    entrypoint: ["/app/entry.sh"]
    command: gunicorn -c gunicorn_config.py project.wsgi:application
    volumes:
      - static_volume:/app/staticfiles
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: always
    networks:
      - intranet

  nginx:
    build:
      context: .
      dockerfile: ./docker/prod/frontend/Dockerfile
    volumes:
      - static_volume:/app/staticfiles:ro
      # Uncomment below for production SSL with Certbot
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "8087:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - intranet

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - intranet

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - intranet

networks:
  intranet:
    driver: bridge

volumes:
  postgres_prod_data:
  static_volume:
